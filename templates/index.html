<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Image Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Add version parameter to force cache refresh -->
    <link rel="stylesheet" href="/static/style.css?v=1.0">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-gray-800 mb-2">✨ AI Image Generator</h1>
                <p class="text-gray-600">Transform your ideas into stunning visuals with Seedream</p>
            </div>
            <button id="galleryBtn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition">
                🖼️ My Gallery
            </button>
        </header>

        <!-- Gallery Section (Hidden by default) -->
        <div id="gallerySection" class="hidden mb-10 bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">My Personal Gallery</h2>
                <button id="closeGalleryBtn" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Gallery items will be injected here -->
                <p class="text-gray-500 col-span-full text-center py-8">No images in your gallery yet. Generate some!</p>
            </div>
        </div>

        <!-- Main Generation Section -->
        <div id="mainSection" class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <div class="auth-container">
                <label for="accessCode">Access Code:</label>
                <input type="password" id="accessCode" placeholder="Enter access code">
            </div>

            <div class="model-select-container">
                <label for="modelSelect">Select Model:</label>
                <select id="modelSelect">
                    <!-- Options will be populated by JS -->
                </select>
            </div>
            
            <div class="style-select-container">
                <label for="categorySelect">Category:</label>
                <select id="categorySelect">
                    <option value="all">All Categories</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="style-select-container">
                <label for="styleSelect">Style:</label>
                <select id="styleSelect">
                    <!-- Options will be populated based on category -->
                </select>
            </div>

            <!-- Custom Style Input (Hidden by default) -->
            <div id="customStyleContainer" class="hidden">
                <label for="customStyleInput">Custom Style:</label>
                <input type="text" id="customStyleInput" placeholder="e.g. Lego blocks, Paper cut art, Minecraft...">
            </div>

            <div class="relative">
                <textarea id="promptInput" class="w-full h-32 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none" placeholder="Describe the image you want to generate..."></textarea>
                <button id="surpriseBtn" class="absolute bottom-4 right-4 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-sm font-bold py-1 px-3 rounded-full shadow transition flex items-center gap-1" title="Generate a random prompt">
                    🎲 Surprise Me
                </button>
            </div>
            
            <button id="generateBtn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform transition hover:scale-105 mt-4">
                ✨ Generate Image
            </button>
        </div>

        <div id="loading" class="hidden">
            <p>Generating... please wait.</p>
        </div>

        <div id="resultSection" class="hidden">
            <img id="generatedImage" src="" alt="Generated Image">
            <p id="finalPromptDisplay"></p>
        </div>

        <div id="errorSection" class="hidden error">
            <p id="errorMessage"></p>
        </div>

        <!-- Debug Section (Collapsible) -->
        <details id="debugSection" class="debug-section hidden">
            <summary>Debug Info</summary>
            <div class="debug-content">
                <div class="debug-grid">
                    <div class="debug-item">
                        <strong>Original Prompt:</strong>
                        <pre id="debugOriginalPrompt">...</pre>
                    </div>
                    <div class="debug-item">
                        <strong>Final Prompt (Processed):</strong>
                        <pre id="debugFinalPrompt">...</pre>
                    </div>
                </div>
                <div class="debug-metrics">
                    <span><strong>Time:</strong> <span id="debugTime">0s</span></span>
                    <span><strong>Est. Tokens:</strong> <span id="debugTokens">0</span></span>
                </div>
            </div>
        </details>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-75 hidden flex items-center justify-center z-50 p-4">
        <div class="relative max-w-4xl w-full">
            <button id="closeModalBtn" class="absolute -top-10 right-0 text-white hover:text-gray-300">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <img id="modalImage" src="" alt="Full size" class="w-full h-auto rounded shadow-lg">
            <div class="mt-4 bg-white p-4 rounded text-gray-800">
                <p id="modalPrompt" class="font-medium"></p>
                <div class="flex justify-between mt-2 text-sm text-gray-500">
                    <span id="modalDate"></span>
                    <span id="modalStyle"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
